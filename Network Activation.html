<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Network Activation Tool - FINAL</title>

<style>
body {font-family: Arial; background:#eef2f7; padding:20px;}
.container {background:#fff; padding:25px; border-radius:12px; max-width:900px; margin:auto;}
.section {margin-bottom:15px;}

#result {
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  display:none;
  font-weight:bold;
  background:#fff3cd;
}

#note {
  margin-top:15px;
  padding:15px;
  border-radius:10px;
  background:#eef7ff;
  display:none;
}

.step {
  background:#fff;
  margin-bottom:10px;
  padding:10px;
  border-left:4px solid #007bff;
}

button {margin-top:10px; padding:8px 12px; border:none; border-radius:6px; cursor:pointer;}
.copy {background:green; color:white;}
.reset {background:red; color:white;}
</style>

</head>
<body>

<div class="container">

<h2>Network Activation Decision Tool</h2>

<div class="section">
<label>هل تم تجاوز SLA؟</label><br>
<label><input type="radio" name="sla" value="within"> Within SLA</label>
<label><input type="radio" name="sla" value="after"> After SLA</label>
</div>

<div class="section">
<label>هل حصل تأخير؟</label><br>
<label><input type="radio" name="delay" value="yes"> Yes</label>
<label><input type="radio" name="delay" value="no"> No</label>
</div>

<div id="result"></div>
<div id="note"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {

  const sla = document.querySelector('input[name="sla"]:checked')?.value;
  const delay = document.querySelector('input[name="delay"]:checked')?.value;

  const result = document.getElementById("result");
  const note = document.getElementById("note");

  if (!sla || !delay) return;

  let message = "";
  let noteText = "";

  // 🔴 Delay Case
  if (delay === "yes") {
    message = "BB Non-Technical Complaint -> Migration - Installation -> FO-Fiber - Delay -> Create";

    noteText = `
<div class="step"><b>📌 Delay Detected:</b><br>
تم تجاوز المدة المحددة للمرحلة
</div>

<div class="step"><b>📩 Action:</b><br>
Activation Follow Up
</div>

<div class="step"><b>⏱️ SLA:</b><br>
4 Hours
</div>

<div class="step"><b>📌 Status:</b><br>
Waiting for action - Activation Team
</div>
`;
  }

  // 🟢 Normal Network Activation
  else {

    if (sla === "within") {
      message = "FBB Non Tech follow up -> FTTH Migration -> Network activation within SLA -> Create (خلال)";
    } else {
      message = "FBB Non Tech follow up -> FTTH Migration -> Network activation after SLA -> Create (بعد)";
    }

    noteText = `
<div class="step"><b>📌 المرحلة:</b><br>
Network Activation
</div>

<div class="step"><b>⏱️ مدة المرحلة:</b><br>
عادة خلال 24 إلى 48 ساعة بعد التركيب
</div>

<div class="step"><b>📌 في حالة التأخير:</b><br>
يتم إنشاء SR تأخير والمتابعة مع Activation Team
</div>

<div class="step"><b>📌 SR المستخدم:</b><br>
${message}
</div>
`;
  }

  result.style.display = "block";
  note.style.display = "block";

  result.innerText = message;
  note.innerHTML = noteText;
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied ✅");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("note").style.display = "none";
}

</script>

</body>
</html>
