<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unreached Survey Tool - FINAL</title>

<style>
body { font-family: Arial; background:#eef2f7; padding:20px; }
.container { background:#fff; padding:25px; border-radius:12px; max-width:800px; margin:auto; }
.section { margin-bottom:15px; }
#result { margin-top:20px; padding:15px; border-radius:10px; display:none; font-weight:bold; }
.note { margin-top:15px; background:#fff3cd; padding:10px; border-radius:5px; display:none; white-space:pre-line; }
button { margin-top:10px; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
.copy { background:#28a745; color:white; }
.reset { background:#dc3545; color:white; }
</style>

</head>
<body>

<div class="container">

<h2>Unreached Survey Decision Tool</h2>

<div class="section">
<label>Survey Completed?</label><br>
<label><input type="radio" name="survey" value="yes"> Yes</label>
<label><input type="radio" name="survey" value="no"> No</label>
</div>

<div class="section">
<label>هل تم تجاوز SLA؟</label><br>
<label><input type="radio" name="sla" value="yes"> Yes</label>
<label><input type="radio" name="sla" value="no"> No</label>
</div>

<div class="section">
<label>هل حصل تأخير؟</label><br>
<label><input type="radio" name="delay" value="yes"> Yes</label>
<label><input type="radio" name="delay" value="no"> No</label>
</div>

<div id="result"></div>
<div id="note" class="note"></div>

<button class="copy" onclick="copyResult()">Copy</button>
<button class="reset" onclick="resetAll()">Reset</button>

</div>

<script>

const inputs = document.querySelectorAll('input');
inputs.forEach(i => i.addEventListener('change', generate));

function generate() {

  const survey = document.querySelector('input[name="survey"]:checked')?.value;
  const sla = document.querySelector('input[name="sla"]:checked')?.value;
  const delay = document.querySelector('input[name="delay"]:checked')?.value;

  const result = document.getElementById("result");
  const note = document.getElementById("note");

  if (!survey || !sla || !delay) return;

  let message = "";
  let noteText = "";

  // 🔴 Delay Priority
  if (delay === "yes") {
    message = "BB Non-Technical Complaint -> Migration - Installation -> FO-Fiber - Delay -> Create";

    noteText = `📌 Issue: Delay in Installation

📩 Action:
Activation Follow Up

⏱️ SLA: 4 Hours

📌 Status:
Waiting for action - Activation Team`;

    note.style.display = "block";
    note.innerText = noteText;
  }

  // 🟢 Unreached Survey
  else if (survey === "yes") {

    if (sla === "no") {
      message = "FBB Non Tech follow up -> FTTH Migration -> Unreached Survey within SLA -> Create (خلال)";
    } else {
      message = "FBB Non Tech follow up -> FTTH Migration -> Unreached Survey After SLA -> Create (بعد)";
    }

    noteText = `📌 المرحلة: Unreached Survey

📌 لم يتم الوصول للعميل

⏱️ SLA: 5 Days`;

    note.style.display = "block";
    note.innerText = noteText;
  }

  else {
    message = "Pending Follow Up";
    note.style.display = "none";
  }

  result.style.display = "block";
  result.innerText = message;
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  if (!text) return;
  navigator.clipboard.writeText(text);
  alert("Copied ✅");
}

function resetAll() {
  document.querySelectorAll('input').forEach(i => i.checked = false);
  document.getElementById("result").style.display = "none";
  document.getElementById("note").style.display = "none";
}

</script>

</body>
</html>
